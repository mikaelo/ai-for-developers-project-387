name: integration

on:
  push:
    branches:
      - "**"
  pull_request:

jobs:
  e2e:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: |
            package-lock.json
            frontend/package-lock.json

      - uses: actions/setup-dotnet@v6
        with:
          dotnet-version: 10.x

      - name: Install root dependencies
        run: npm ci

      - name: Install frontend dependencies
        run: npm --prefix frontend ci

      - name: Install Playwright browser
        run: npx --prefix frontend playwright install --with-deps chromium

      - name: Compile contract
        run: npm run compile

      - name: Run backend tests
        run: npm run backend:test

      - name: Build frontend
        run: npm run frontend:build

      - name: Run integration tests
        run: npm run integration:test

      - name: Build Docker image
        run: docker build -t call-calendar .

      - name: Smoke test Docker image
        run: |
          docker run -d --rm --name call-calendar-smoke -e PORT=8080 -p 8080:8080 call-calendar
          for i in {1..30}; do
            if curl -fsS http://127.0.0.1:8080/event-types > /tmp/event-types.json; then
              break
            fi
            sleep 2
          done
          curl -fsS http://127.0.0.1:8080/ > /tmp/index.html
          curl -fsS http://127.0.0.1:8080/admin/bookings > /tmp/admin-bookings.html
          grep -q "Call Calendar" /tmp/index.html
          grep -q "Call Calendar" /tmp/admin-bookings.html
          grep -q "intro-call" /tmp/event-types.json
          docker stop call-calendar-smoke
