name: opencode

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]

jobs:
  opencode:
    if: |
      contains(github.event.comment.body, ' /oc') ||
      startsWith(github.event.comment.body, '/oc') ||
      contains(github.event.comment.body, ' /opencode') ||
      startsWith(github.event.comment.body, '/opencode')
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: write
      pull-requests: write
      issues: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Run opencode
        uses: anomalyco/opencode/github@latest
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          model: anthropic/claude-sonnet-4-6
          use_github_token: true

      - name: Fix opencode share link
        if: always()
        uses: actions/github-script@v8
        with:
          script: |
            const { owner, repo, number: issue_number } = context.issue;
            const runPath = `/${owner}/${repo}/actions/runs/${context.runId}`;
            const { data: comments } = await github.rest.issues.listComments({
              owner,
              repo,
              issue_number,
              per_page: 100,
            });

            for (const comment of comments) {
              if (!comment.body?.includes("https://opencode.ai/s/") || !comment.body.includes(runPath)) {
                continue;
              }

              await github.rest.issues.updateComment({
                owner,
                repo,
                comment_id: comment.id,
                body: comment.body.replaceAll("https://opencode.ai/s/", "https://opncd.ai/share/"),
              });
            }
